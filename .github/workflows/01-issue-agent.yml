name: 🤖 01 — Issue → Agent

on:
  issues:
    types: [opened, reopened, labeled, unlabeled, closed]
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read
  contents: read

concurrency:
  group: copilot-issue-queue
  cancel-in-progress: false

jobs:
  trigger-copilot-agent:
    name: Sync queue and assign Copilot
    runs-on: ubuntu-latest

    steps:
      - name: Queue tasks and find next issue
        uses: actions/github-script@v7
        id: queue
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: string
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const copilotAssigneeLogins = ['copilot-swe-agent[bot]'];
            const copilotBranchPrefixes = ['feature/task-', 'copilot/'];

            const hasLabel = (issue, name) => issue.labels.some(label => label.name === name);
            const isTaskIssue = (issue) => !issue.pull_request && hasLabel(issue, 'agent-task');

            // When an issue is closed, remove all status labels from it and move on to queue logic
            if (context.eventName === 'issues' && context.payload.action === 'closed') {
              const closedNum = context.payload.issue.number;
              await github.rest.issues.removeLabel({ owner, repo, issue_number: closedNum, name: 'agent-in-progress' }).catch(() => {});
              await github.rest.issues.removeLabel({ owner, repo, issue_number: closedNum, name: 'agent-queued' }).catch(() => {});
            }

            async function setStatusLabels(issueNumber, makeActive) {
              const add = makeActive ? 'agent-in-progress' : 'agent-queued';
              const remove = makeActive ? 'agent-queued' : 'agent-in-progress';
              await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: [add] }).catch(() => {});
              await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: remove }).catch(() => {});
            }

            const openIssues = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: 'open', per_page: 100 });
            const taskIssues = openIssues.filter(isTaskIssue).sort((a, b) => a.number - b.number);

            if (taskIssues.length === 0) {
              return JSON.stringify({ action: 'none' });
            }

            const openPRs = await github.paginate(github.rest.pulls.list, { owner, repo, state: 'open', per_page: 100 });
            const activePR = openPRs.find(pr => copilotBranchPrefixes.some(prefix => pr.head.ref.startsWith(prefix)));

            const assignedIssue = taskIssues.find(issue =>
              issue.assignees?.some(a => copilotAssigneeLogins.includes(a.login))
            );

            let activeIssueNumber = assignedIssue?.number ?? null;

            if (!activeIssueNumber && activePR) {
              const match = (activePR.body || '').match(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/i);
              if (match) activeIssueNumber = parseInt(match[1], 10);
            }

            if (activePR && !activeIssueNumber) {
              for (const issue of taskIssues) await setStatusLabels(issue.number, false);
              return JSON.stringify({ action: 'none' });
            }

            if (activeIssueNumber) {
              for (const issue of taskIssues) await setStatusLabels(issue.number, issue.number === activeIssueNumber);
              return JSON.stringify({ action: 'none' });
            }

            const nextIssue = taskIssues[0];
            for (const issue of taskIssues) await setStatusLabels(issue.number, issue.number === nextIssue.number);

            const repositoryInfo = context.payload.repository
              ? { default_branch: context.payload.repository.default_branch }
              : (await github.rest.repos.get({ owner, repo })).data;

            return JSON.stringify({
              action: 'assign',
              issueNumber: nextIssue.number,
              defaultBranch: repositoryInfo.default_branch,
            });

      - name: Assign Copilot to the next issue
        if: fromJSON(steps.queue.outputs.result).action == 'assign'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const queueResult = ${{ steps.queue.outputs.result }};
            const issueNumber = queueResult.issueNumber;
            const defaultBranch = queueResult.defaultBranch;

            try {
              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
                owner, repo, issue_number: issueNumber,
                headers: { accept: 'application/vnd.github+json', 'x-github-api-version': '2022-11-28' },
                assignees: ['copilot-swe-agent[bot]'],
                agent_assignment: {
                  target_repo: `${owner}/${repo}`,
                  base_branch: defaultBranch,
                  custom_instructions: [
                    'Use the issue body and .github/copilot-instructions.md as the primary requirements.',
                    'Open a pull request that includes "Closes #' + issueNumber + '" in the description.',
                  ].join('. '),
                },
              });
              console.log(`Assigned issue #${issueNumber} to Copilot.`);
            } catch (error) {
              await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: 'agent-in-progress' }).catch(() => {});
              await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: ['agent-queued'] }).catch(() => {});
              throw error;
            }
        env:
          COPILOT_PAT_SET: ${{ secrets.COPILOT_PAT != '' && 'true' || 'false' }}
