name: 🔓 05 — Auto Approve Workflow Runs

# ────────────────────────────────────────────────────────────────
# Safety-net workflow that automatically approves pending CI runs
# for Copilot branches. Uses `workflow_run` trigger so it always
# runs on the default branch context (no approval needed itself).
# ────────────────────────────────────────────────────────────────
on:
  workflow_run:
    workflows:
      - "🧪 02 — PR Tests"
    types: [requested]

permissions:
  actions: write

jobs:
  approve-run:
    name: Auto-approve Copilot workflow run
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.event.workflow_run.head_branch, 'feature/task-') ||
      startsWith(github.event.workflow_run.head_branch, 'copilot/')

    steps:
      - name: Wait for run to enter approval queue
        run: sleep 10

      - name: Approve the pending workflow run
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.payload.workflow_run.id;
            const runName = context.payload.workflow_run.name;
            const branch = context.payload.workflow_run.head_branch;

            console.log(`Attempting to approve run #${runId} (${runName}) on branch ${branch}`);

            // Retry loop — the run may not yet be in action_required state
            const maxAttempts = 6;
            const delayMs = 10_000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              try {
                // Check current run status
                const { data: run } = await github.rest.actions.getWorkflowRun({
                  owner, repo, run_id: runId,
                });

                if (run.status === 'action_required') {
                  await github.rest.actions.approveWorkflowRun({ owner, repo, run_id: runId });
                  console.log(`✅ Approved run #${runId} on attempt ${attempt}`);
                  return;
                }

                if (run.status === 'completed' || run.status === 'in_progress' || run.status === 'queued') {
                  console.log(`Run #${runId} is already ${run.status} — no approval needed.`);
                  return;
                }

                console.log(`[attempt ${attempt}] Run status is '${run.status}', waiting…`);
              } catch (e) {
                console.log(`[attempt ${attempt}] Error: ${e.message}`);
              }

              if (attempt < maxAttempts) {
                await new Promise(r => setTimeout(r, delayMs));
              }
            }

            console.log(`⚠️ Could not approve run #${runId} after ${maxAttempts} attempts.`);

      # Also approve any other pending runs for the same head SHA
      - name: Approve other pending runs for this SHA
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.workflow_run.head_sha;

            const { data: runsData } = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              head_sha: headSha,
              status: 'action_required',
              per_page: 50,
            });

            for (const run of runsData.workflow_runs) {
              console.log(`Approving additional pending run #${run.id} (${run.name})`);
              try {
                await github.rest.actions.approveWorkflowRun({ owner, repo, run_id: run.id });
                console.log(`  ✅ Approved run #${run.id}`);
              } catch (e) {
                console.log(`  ❌ Could not approve run #${run.id}: ${e.message}`);
              }
            }

            if (runsData.total_count === 0) {
              console.log('No additional pending runs to approve.');
            }
