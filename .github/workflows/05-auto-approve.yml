name: 🔓 05 — Auto Approve Workflow Runs

# ────────────────────────────────────────────────────────────────
# Safety-net workflow that automatically approves pending CI runs
# for Copilot branches.  Uses `workflow_run` trigger so it runs on
# the default branch context (no approval needed itself after the
# very first run is manually approved).
#
# ⚠️ IMPORTANT LIMITATION:
# The REST API `POST /repos/{owner}/{repo}/actions/runs/{run_id}/approve`
# only works for **fork** pull requests.  For same-repo Copilot PRs
# it returns "This run is not from a fork pull request".
#
# The primary fix for same-repo PRs is to use pull_request_target
# in Workflow 02 (PR Tests).  This workflow is kept as a safety net
# for any future fork-based PRs.
# ────────────────────────────────────────────────────────────────
on:
  workflow_run:
    workflows:
      - "🧪 02 — PR Tests"
    types: [requested]

permissions:
  actions: write

jobs:
  approve-run:
    name: Auto-approve Copilot workflow run
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.event.workflow_run.head_branch, 'feature/task-') ||
      startsWith(github.event.workflow_run.head_branch, 'copilot/')

    steps:
      - name: Wait for run to enter approval queue
        run: sleep 10

      - name: Approve the pending workflow run (fork PRs only)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.payload.workflow_run.id;
            const runName = context.payload.workflow_run.name;
            const branch = context.payload.workflow_run.head_branch;

            console.log(`Checking run #${runId} (${runName}) on branch ${branch}`);

            const maxAttempts = 6;
            const delayMs = 10_000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              try {
                const { data: run } = await github.rest.actions.getWorkflowRun({
                  owner, repo, run_id: runId,
                });

                if (run.status === 'completed' || run.status === 'in_progress' || run.status === 'queued') {
                  console.log(`Run #${runId} is already ${run.status} — no approval needed.`);
                  return;
                }

                if (run.status === 'action_required') {
                  try {
                    await github.rest.actions.approveWorkflowRun({ owner, repo, run_id: runId });
                    console.log(`✅ Approved run #${runId} on attempt ${attempt}`);
                    return;
                  } catch (e) {
                    // Expected for same-repo PRs — the API only works for fork PRs
                    if (e.message.includes('not from a fork')) {
                      console.log(`Run #${runId} is not from a fork PR — approve API not applicable. Workflow 02 should use pull_request_target instead.`);
                      return;
                    }
                    throw e;
                  }
                }

                console.log(`[attempt ${attempt}] Run status is '${run.status}', waiting…`);
              } catch (e) {
                console.log(`[attempt ${attempt}] Error: ${e.message}`);
              }

              if (attempt < maxAttempts) {
                await new Promise(r => setTimeout(r, delayMs));
              }
            }

            console.log(`⚠️ Could not approve run #${runId} after ${maxAttempts} attempts.`);
