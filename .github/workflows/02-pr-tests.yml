name: 🧪 02 — PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'

jobs:
  test-backend:
    name: 🔷 Backend Tests (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check if backend exists
        id: check-backend
        run: |
          if [ -d "src/backend" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup .NET 10
        if: steps.check-backend.outputs.exists == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        if: steps.check-backend.outputs.exists == 'true'
        run: dotnet restore src/backend/PatientApi/PatientApi.csproj

      - name: Build
        if: steps.check-backend.outputs.exists == 'true'
        run: dotnet build src/backend/PatientApi/PatientApi.csproj --configuration Release --no-restore

      - name: Run tests
        if: steps.check-backend.outputs.exists == 'true'
        run: |
          if [ -d "src/backend/PatientApi.Tests" ]; then
            dotnet test src/backend/PatientApi.Tests/PatientApi.Tests.csproj --configuration Release --no-build
          else
            echo "Test project not found, skipping"
          fi

  test-frontend:
    name: 🟢 Frontend Tests (Vue/Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check if frontend exists
        id: check-frontend
        run: |
          if [ -d "src/frontend" ] && [ -f "src/frontend/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check-frontend.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        if: steps.check-frontend.outputs.exists == 'true'
        run: npm ci
        working-directory: src/frontend

      - name: Build
        if: steps.check-frontend.outputs.exists == 'true'
        run: npm run build
        working-directory: src/frontend

      - name: Run tests
        if: steps.check-frontend.outputs.exists == 'true'
        run: |
          if npm run 2>/dev/null | grep -q "^\s*test"; then
            npm test -- --run
          else
            echo "No test script found, skipping"
          fi
        working-directory: src/frontend

  pr-summary:
    name: 📋 Post Test Summary
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Post summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              backend: '${{ needs.test-backend.result }}',
              frontend: '${{ needs.test-frontend.result }}',
            };

            const icon = (result) => {
              if (result === 'success') return '✅';
              if (result === 'skipped') return '⏭️';
              if (result === 'failure') return '❌';
              return '⚠️';
            };

            const allPassed = Object.values(jobs).every(r => r === 'success' || r === 'skipped');

            const body = [
              `## 🧪 Test Results`,
              ``,
              `| Job | Result |`,
              `|-----|--------|`,
              `| 🔷 Backend (.NET 10) | ${icon(jobs.backend)} ${jobs.backend} |`,
              `| 🟢 Frontend (Vue/Vitest) | ${icon(jobs.frontend)} ${jobs.frontend} |`,
              ``,
              allPassed
                ? `### ✅ All checks passed`
                : `### ❌ One or more checks failed`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Test Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
