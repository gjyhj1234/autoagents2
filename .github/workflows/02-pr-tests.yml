name: 🧪 02 — PR Auto Tests

# ═══════════════════════════════════════════════════════════════════════════
# TRIGGER: Runs on every pull request (opened, updated, or reopened).
#          Tests the backend (.NET 10), frontend (Vue/Vitest), and does a
#          Docker Compose smoke test to validate the full stack.
#
# PIPELINE POSITION:  Copilot PR created → [THIS WORKFLOW] → auto-merge
# ═══════════════════════════════════════════════════════════════════════════

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'
  POSTGRES_DB: dentalchart_test
  POSTGRES_USER: dentalchart
  POSTGRES_PASSWORD: test_password_ci

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Backend .NET 10 Tests
  # ─────────────────────────────────────────────────────────────────────────
  test-backend:
    name: 🔷 Backend Tests (.NET 10)
    runs-on: ubuntu-latest
    # Only run if backend source files changed (or if no src/ exists yet, skip gracefully)
    if: >
      contains(github.event.pull_request.changed_files, 'src/backend') ||
      github.event_name == 'workflow_dispatch'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Check if backend exists
        id: check-backend
        run: |
          if [ -d "src/backend" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  Backend source not yet created — skipping backend tests"
          fi

      - name: Setup .NET 10
        if: steps.check-backend.outputs.exists == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        if: steps.check-backend.outputs.exists == 'true'
        run: dotnet restore src/backend/DentalChart.sln

      - name: Build (Release + AOT validation)
        if: steps.check-backend.outputs.exists == 'true'
        run: dotnet build src/backend/DentalChart.sln --configuration Release --no-restore

      - name: Run unit tests
        if: steps.check-backend.outputs.exists == 'true'
        run: |
          dotnet test src/backend/DentalChart.sln \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
        env:
          ConnectionStrings__DefaultConnection: >
            Host=localhost;Port=5432;Database=${{ env.POSTGRES_DB }};
            Username=${{ env.POSTGRES_USER }};Password=${{ env.POSTGRES_PASSWORD }}

      - name: Publish test results
        if: steps.check-backend.outputs.exists == 'true' && always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Test Results
          path: test-results/*.trx
          reporter: dotnet-trx

      - name: Upload coverage report
        if: steps.check-backend.outputs.exists == 'true'
        uses: codecov/codecov-action@v4
        with:
          files: ./test-results/**/coverage.cobertura.xml
          flags: backend

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Frontend Vue / Vitest Tests
  # ─────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: 🟢 Frontend Tests (Vue/Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check if frontend exists
        id: check-frontend
        run: |
          if [ -d "src/frontend" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  Frontend source not yet created — skipping frontend tests"
          fi

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        if: steps.check-frontend.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        if: steps.check-frontend.outputs.exists == 'true'
        run: npm ci
        working-directory: src/frontend

      - name: TypeScript type check
        if: steps.check-frontend.outputs.exists == 'true'
        run: npm run type-check
        working-directory: src/frontend

      - name: Lint (ESLint)
        if: steps.check-frontend.outputs.exists == 'true'
        run: npm run lint
        working-directory: src/frontend

      - name: Run unit tests with coverage
        if: steps.check-frontend.outputs.exists == 'true'
        run: npm run test:coverage
        working-directory: src/frontend

      - name: Build production bundle
        if: steps.check-frontend.outputs.exists == 'true'
        run: npm run build
        working-directory: src/frontend

      - name: Upload frontend coverage
        if: steps.check-frontend.outputs.exists == 'true'
        uses: codecov/codecov-action@v4
        with:
          files: src/frontend/coverage/lcov.info
          flags: frontend

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3: Docker Compose Smoke Test
  # ─────────────────────────────────────────────────────────────────────────
  test-docker:
    name: 🐳 Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: always()   # run even if earlier jobs were skipped

    steps:
      - uses: actions/checkout@v4

      - name: Check if docker-compose exists
        id: check-docker
        run: |
          if [ -f "docker/docker-compose.yml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  docker-compose.yml not yet created — skipping smoke test"
          fi

      - name: Start services
        if: steps.check-docker.outputs.exists == 'true'
        run: |
          cd docker
          docker compose up -d --wait --timeout 120
        env:
          POSTGRES_PASSWORD: smoke_test_password

      - name: Health check — API
        if: steps.check-docker.outputs.exists == 'true'
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ API is healthy (HTTP 200)"
              exit 0
            fi
            echo "Waiting for API... attempt $i (got $STATUS)"
            sleep 3
          done
          echo "❌ API did not become healthy"
          docker compose -f docker/docker-compose.yml logs
          exit 1

      - name: Health check — Frontend
        if: steps.check-docker.outputs.exists == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
            echo "✅ Frontend is healthy (HTTP $STATUS)"
          else
            echo "❌ Frontend returned HTTP $STATUS"
            exit 1
          fi

      - name: Stop services
        if: steps.check-docker.outputs.exists == 'true' && always()
        run: docker compose -f docker/docker-compose.yml down -v

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4: PR Summary Comment
  # ─────────────────────────────────────────────────────────────────────────
  pr-summary:
    name: 📋 Post Test Summary
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-docker]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Post summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              backend: '${{ needs.test-backend.result }}',
              frontend: '${{ needs.test-frontend.result }}',
              docker: '${{ needs.test-docker.result }}',
            };

            const icon = (result) => {
              if (result === 'success') return '✅';
              if (result === 'skipped') return '⏭️';
              if (result === 'failure') return '❌';
              return '⚠️';
            };

            const allPassed = Object.values(jobs).every(r => r === 'success' || r === 'skipped');

            const body = [
              `## 🧪 Automated Test Results`,
              ``,
              `| Job | Result |`,
              `|-----|--------|`,
              `| 🔷 Backend (.NET 10) | ${icon(jobs.backend)} ${jobs.backend} |`,
              `| 🟢 Frontend (Vue/Vitest) | ${icon(jobs.frontend)} ${jobs.frontend} |`,
              `| 🐳 Docker Smoke Test | ${icon(jobs.docker)} ${jobs.docker} |`,
              ``,
              allPassed
                ? `### ✅ All checks passed — this PR is eligible for auto-merge.`
                : `### ❌ One or more checks failed — review the failures before merging.`,
              ``,
              `*Pipeline: Issue → Agent → PR → [Tests] → Auto-Merge*`,
            ].join('\n');

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Automated Test Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
