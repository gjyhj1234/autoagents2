name: 🧪 02 — PR Tests

# ────────────────────────────────────────────────────────────────
# Uses pull_request_target so this workflow runs in the context of
# the BASE branch (main).  This avoids the "awaiting maintainer
# approval" gate that blocks pull_request-triggered workflows when
# the PR author is a first-time or outside contributor (e.g.
# copilot-swe-agent[bot]).
#
# ⚠️ SECURITY NOTE: The checkout step uses the PR head SHA, so we
# build and test UNTRUSTED code with elevated privileges.  Only
# acceptable in private / fully-trusted repositories.
#
# NOTE: The approveWorkflowRun REST API only works for *fork* pull
# requests.  For same-repo Copilot PRs the only reliable fix is to
# use pull_request_target.
# ────────────────────────────────────────────────────────────────
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  statuses: write
  actions: write

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'

jobs:
  test-backend:
    name: 🔷 Backend Tests (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check if backend exists
        id: check-backend
        run: |
          if [ -d "src/backend" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup .NET 10
        if: steps.check-backend.outputs.exists == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        if: steps.check-backend.outputs.exists == 'true'
        run: dotnet restore src/backend/PatientApi/PatientApi.csproj

      - name: Build
        if: steps.check-backend.outputs.exists == 'true'
        run: dotnet build src/backend/PatientApi/PatientApi.csproj --configuration Release --no-restore

      - name: Run tests
        if: steps.check-backend.outputs.exists == 'true'
        run: |
          if [ -d "src/backend/PatientApi.Tests" ]; then
            dotnet test src/backend/PatientApi.Tests/PatientApi.Tests.csproj --configuration Release --no-build
          else
            echo "Test project not found, skipping"
          fi

  test-frontend:
    name: 🟢 Frontend Tests (Vue/Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check if frontend exists
        id: check-frontend
        run: |
          if [ -d "src/frontend" ] && [ -f "src/frontend/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check-frontend.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        if: steps.check-frontend.outputs.exists == 'true'
        run: npm ci
        working-directory: src/frontend

      - name: Build
        if: steps.check-frontend.outputs.exists == 'true'
        run: npm run build
        working-directory: src/frontend

      - name: Run tests
        if: steps.check-frontend.outputs.exists == 'true'
        run: |
          if npm run 2>/dev/null | grep -q "^\s*test"; then
            npm test -- --run
          else
            echo "No test script found, skipping"
          fi
        working-directory: src/frontend

  pr-summary:
    name: 📋 Post Test Summary
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: always() && github.event.pull_request

    steps:
      - name: Post summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              backend: '${{ needs.test-backend.result }}',
              frontend: '${{ needs.test-frontend.result }}',
            };

            const icon = (result) => {
              if (result === 'success') return '✅';
              if (result === 'skipped') return '⏭️';
              if (result === 'failure') return '❌';
              return '⚠️';
            };

            const allPassed = Object.values(jobs).every(r => r === 'success' || r === 'skipped');

            const body = [
              `## 🧪 Test Results`,
              ``,
              `| Job | Result |`,
              `|-----|--------|`,
              `| 🔷 Backend (.NET 10) | ${icon(jobs.backend)} ${jobs.backend} |`,
              `| 🟢 Frontend (Vue/Vitest) | ${icon(jobs.frontend)} ${jobs.frontend} |`,
              ``,
              allPassed
                ? `### ✅ All checks passed`
                : `### ❌ One or more checks failed`,
            ].join('\n');

            const prNumber = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Test Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      # Because pull_request_target check runs are NOT associated with the
      # PR head SHA, we create an explicit commit status so that Workflow 03
      # (Auto-Merge) can verify tests passed via getCombinedStatusForRef().
      - name: Set commit status on PR head
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              backend: '${{ needs.test-backend.result }}',
              frontend: '${{ needs.test-frontend.result }}',
            };
            const allPassed = Object.values(jobs).every(
              r => r === 'success' || r === 'skipped'
            );
            const prHeadSha = context.payload.pull_request.head.sha;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: prHeadSha,
              state: allPassed ? 'success' : 'failure',
              context: 'ci/pr-tests',
              description: allPassed
                ? 'All PR tests passed'
                : 'Some PR tests failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Trigger auto-merge evaluation
        if: |
          always() &&
          needs.test-backend.result != 'failure' &&
          needs.test-frontend.result != 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: '03-auto-merge.yml',
                ref: 'main',
                inputs: {
                  pr_number: String(context.payload.pull_request.number),
                },
              });
              console.log('Triggered auto-merge evaluation for PR #' + context.payload.pull_request.number);
            } catch (e) {
              console.log(`Could not trigger auto-merge: ${e.message}`);
            }
