name: 🔀 03 — Auto Merge

on:
  check_suite:
    types: [completed]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to auto-merge'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read
  actions: write

jobs:
  auto-merge:
    name: Evaluate PRs for Auto-Merge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find and merge eligible PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const copilotBranchPrefixes = ['feature/task-', 'copilot/'];

            const manualPr = context.payload.inputs?.pr_number
              ? parseInt(context.payload.inputs.pr_number)
              : null;

            let prs;
            if (manualPr) {
              const { data } = await github.rest.pulls.get({ owner, repo, pull_number: manualPr });
              prs = [data];
            } else {
              const { data } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 50 });
              prs = data;
            }

            for (const pr of prs) {
              console.log(`\nEvaluating PR #${pr.number}: ${pr.title}`);

              const hasAutoMergeLabel = pr.labels.some(l => l.name === 'auto-merge');
              const isCopilotBranch = copilotBranchPrefixes.some(p => pr.head.ref.startsWith(p));

              if (!hasAutoMergeLabel && !isCopilotBranch) {
                console.log(`  Skipping — no auto-merge label and not a Copilot branch`);
                continue;
              }

              if (!hasAutoMergeLabel && isCopilotBranch) {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: pr.number, labels: ['auto-merge'],
                }).catch(e => console.log(`  Could not add auto-merge label: ${e.message}`));
              }

              if (pr.draft) {
                try {
                  await github.graphql(`
                    mutation($prId: ID!) {
                      markPullRequestReadyForReview(input: { pullRequestId: $prId }) {
                        pullRequest { isDraft }
                      }
                    }
                  `, { prId: pr.node_id });
                } catch (e) {
                  console.log(`  Could not convert draft PR: ${e.message}`);
                  continue;
                }
              }

              const { data: freshPr } = await github.rest.pulls.get({ owner, repo, pull_number: pr.number });

              if (freshPr.mergeable === false) {
                console.log(`  Skipping — PR has merge conflicts`);
                continue;
              }

              const { data: checkRuns } = await github.rest.checks.listForRef({
                owner, repo, ref: pr.head.sha, per_page: 100,
              });

              const relevantChecks = checkRuns.check_runs.filter(
                c => !c.name.includes('Auto Merge') && !c.name.includes('auto-merge')
                  && !c.name.includes('Auto-Merge') && !c.name.includes('Evaluate PRs')
              );

              const allCompleted = relevantChecks.every(c => c.status === 'completed');
              const allPassed = relevantChecks.every(
                c => c.conclusion === 'success' || c.conclusion === 'skipped' || c.conclusion === 'neutral'
              );

              if (!allCompleted) {
                console.log(`  Skipping — checks not yet complete`);
                continue;
              }

              if (!allPassed) {
                console.log(`  Skipping — some checks failed`);
                continue;
              }

              console.log(`  All checks passed — merging PR #${pr.number}`);

              try {
                await github.rest.pulls.merge({
                  owner, repo, pull_number: pr.number, merge_method: 'squash',
                  commit_title: `${pr.title} (#${pr.number})`,
                });

                const linkedIssues = [];
                const closePatterns = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
                let match;
                while ((match = closePatterns.exec(pr.body || '')) !== null) {
                  linkedIssues.push(parseInt(match[1]));
                }

                const taskMatch = pr.title.match(/task[- ]?(\d+)/i) || pr.head.ref.match(/task[- ]?(\d+)/i);
                if (taskMatch && linkedIssues.length === 0) {
                  const { data: issues } = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
                  const taskNum = taskMatch[1].padStart(2, '0');
                  const matchingIssue = issues.find(i => i.title.includes(`Task-${taskNum}`) || i.title.includes(`task-${taskNum}`));
                  if (matchingIssue) linkedIssues.push(matchingIssue.number);
                }

                for (const issueNum of linkedIssues) {
                  await github.rest.issues.addLabels({ owner, repo, issue_number: issueNum, labels: ['agent-completed'] }).catch(() => {});
                  await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNum, name: 'agent-in-progress' }).catch(() => {});
                  await github.rest.issues.update({ owner, repo, issue_number: issueNum, state: 'closed', state_reason: 'completed' }).catch(() => {});
                }

                try {
                  await github.rest.git.deleteRef({ owner, repo, ref: `heads/${pr.head.ref}` });
                } catch (e) {
                  console.log(`  Could not delete branch: ${e.message}`);
                }

                try {
                  await github.rest.actions.createWorkflowDispatch({
                    owner, repo, workflow_id: '01-issue-agent.yml', ref: 'main',
                  });
                } catch (e) {
                  console.log(`  Could not trigger Workflow 01: ${e.message}`);
                }

              } catch (e) {
                console.log(`  Merge failed: ${e.message}`);
              }
            }
