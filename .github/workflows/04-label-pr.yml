name: 🏷️ 04 — Label Copilot PRs

# ────────────────────────────────────────────────────────────────
# Uses pull_request_target so this workflow runs in the context of
# the BASE branch (main). This means it does NOT require maintainer
# approval for first-time / outside contributors, solving the
# chicken-and-egg problem where the auto-approve step itself was
# stuck awaiting approval.
# ────────────────────────────────────────────────────────────────
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write
  actions: write

jobs:
  label-and-approve:
    name: Label & approve Copilot PRs
    runs-on: ubuntu-latest
    if: startsWith(github.event.pull_request.head.ref, 'feature/task-') || startsWith(github.event.pull_request.head.ref, 'copilot/')

    steps:
      - name: Add auto-merge label
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['auto-merge'],
            }).catch(e => console.log(`Could not add auto-merge label: ${e.message}`));

      # ⚠️ 安全警告：自动批准所有匹配分支的 Workflow Run。
      # 任何提交到 feature/task-* 或 copilot/* 分支的代码都会被自动批准执行。
      # 仅在私有仓库或完全信任所有贡献者时使用。
      - name: Auto-approve pending workflow runs (with retry)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.pull_request.head.sha;
            const maxAttempts = 12;   // 12 × 15s ≈ 3 min total
            const delayMs = 15_000;
            let totalApproved = 0;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const { data: runsData } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                head_sha: headSha,
                status: 'action_required',
                per_page: 50,
              });

              if (runsData.total_count > 0) {
                for (const run of runsData.workflow_runs) {
                  console.log(`[attempt ${attempt}] Approving run #${run.id} (${run.name})`);
                  try {
                    await github.rest.actions.approveWorkflowRun({ owner, repo, run_id: run.id });
                    console.log(`  ✅ Approved run #${run.id}`);
                    totalApproved++;
                  } catch (e) {
                    console.log(`  ❌ Could not approve run #${run.id}: ${e.message}`);
                  }
                }
              } else {
                console.log(`[attempt ${attempt}] No pending runs found.`);
              }

              // After approving runs, if no more are pending, stop early.
              if (totalApproved > 0 && runsData.total_count === 0 && attempt > 1) {
                console.log('All pending runs approved — done.');
                break;
              }

              if (attempt < maxAttempts) {
                console.log(`  Waiting ${delayMs / 1000}s before next check…`);
                await new Promise(r => setTimeout(r, delayMs));
              }
            }

            console.log(`Total runs approved: ${totalApproved}`);
