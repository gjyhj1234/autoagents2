name: 🏷️ 04 — Label Copilot PRs

# ────────────────────────────────────────────────────────────────
# Uses pull_request_target so this workflow runs in the context of
# the BASE branch (main). This means it does NOT require maintainer
# approval for first-time / outside contributors.
#
# NOTE: The GitHub REST API "Approve a workflow run for a fork pull
# request" (POST .../actions/runs/{run_id}/approve) only works for
# *fork* PRs.  For same-repo Copilot branches the API returns
# "This run is not from a fork pull request".  We therefore rely on
# pull_request_target in Workflow 02 instead of trying to approve
# runs here.
# ────────────────────────────────────────────────────────────────
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  label-and-setup:
    name: Label & set up Copilot PRs
    runs-on: ubuntu-latest
    if: startsWith(github.event.pull_request.head.ref, 'feature/task-') || startsWith(github.event.pull_request.head.ref, 'copilot/')

    steps:
      - name: Add auto-merge label
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['auto-merge'],
            }).catch(e => console.log(`Could not add auto-merge label: ${e.message}`));

      - name: Mark PR ready for review (un-draft)
        if: github.event.pull_request.draft == true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const pr = context.payload.pull_request;
            try {
              await github.graphql(`
                mutation($prId: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $prId }) {
                    pullRequest { isDraft }
                  }
                }
              `, { prId: pr.node_id });
              console.log(`Marked PR #${pr.number} as ready for review`);
            } catch (e) {
              console.log(`Could not un-draft PR: ${e.message}`);
            }
