name: 🏷️ 04 — Label Copilot PRs

# ────────────────────────────────────────────────────────────────
# Labels Copilot PRs with "auto-merge" and un-drafts them.
#
# Triggers:
#   - pull_request_target: fast path (may be blocked by Copilot's
#     built-in approval requirement — unreliable)
#   - workflow_dispatch: reliable path, called by 00-pr-dispatcher
#     on a schedule.  NEVER subject to contributor approval.
# ────────────────────────────────────────────────────────────────
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to label and set up'
        required: true
        type: number

permissions:
  pull-requests: write
  issues: write

jobs:
  label-and-setup:
    name: Label & set up Copilot PRs
    runs-on: ubuntu-latest
    # For pull_request_target: only run for Copilot branches
    # For workflow_dispatch: always run (dispatcher already filters)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.pull_request.head.ref, 'feature/task-') ||
      startsWith(github.event.pull_request.head.ref, 'copilot/')

    steps:
      - name: Add auto-merge label and un-draft PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Resolve the PR — either from event payload or from workflow_dispatch input
            let pr;
            if (context.eventName === 'workflow_dispatch') {
              const prNumber = parseInt(context.payload.inputs.pr_number);
              const { data } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              pr = data;
            } else {
              pr = context.payload.pull_request;
            }

            console.log(`Processing PR #${pr.number}: ${pr.title}`);

            // Add auto-merge label
            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: pr.number,
              labels: ['auto-merge'],
            }).catch(e => console.log(`Could not add auto-merge label: ${e.message}`));
            console.log(`Added auto-merge label to PR #${pr.number}`);

            // Un-draft if needed
            if (pr.draft) {
              try {
                await github.graphql(`
                  mutation($prId: ID!) {
                    markPullRequestReadyForReview(input: { pullRequestId: $prId }) {
                      pullRequest { isDraft }
                    }
                  }
                `, { prId: pr.node_id });
                console.log(`Marked PR #${pr.number} as ready for review`);
              } catch (e) {
                console.log(`Could not un-draft PR: ${e.message}`);
              }
            } else {
              console.log(`PR #${pr.number} is not a draft — no un-draft needed`);
            }
