name: 🏷️ 04 — Label Copilot PRs

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  label-for-auto-merge:
    name: Label Copilot PRs
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'feature/task-') || startsWith(github.head_ref, 'copilot/')

    steps:
      - name: Add auto-merge label
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['auto-merge'],
            }).catch(e => console.log(`Could not add auto-merge label: ${e.message}`));
