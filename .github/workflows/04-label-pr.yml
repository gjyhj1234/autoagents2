name: 🏷️ 04 — Label Copilot PRs for Auto-Merge

# ═══════════════════════════════════════════════════════════════════════════
# TRIGGER: When a new PR is opened, if it's from a Copilot feature branch
#          (feature/task-*) automatically add the "auto-merge" label so
#          Workflow 03 can pick it up after tests pass.
# ═══════════════════════════════════════════════════════════════════════════

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  label-for-auto-merge:
    name: Label Copilot PRs
    runs-on: ubuntu-latest
    # Only label PRs from Copilot-generated branches:
    #   - feature/task-*  — branch naming specified in copilot-instructions.md
    #   - copilot/*       — GitHub Copilot Coding Agent's default branch prefix
    #                       (e.g., copilot/fix-issue-5, copilot/create-chart-page)
    if: startsWith(github.head_ref, 'feature/task-') || startsWith(github.head_ref, 'copilot/')

    steps:
      - name: Add auto-merge label
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Add auto-merge label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['auto-merge'],
            }).catch(e => console.log(`Could not add auto-merge label: ${e.message}`));

            console.log(`✅ Labeled PR #${pr.number} with auto-merge`);

            // If PR body references a task issue, add a status comment there
            const linkedIssues = [];
            const closePatterns = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            let match;
            const bodyText = pr.body || '';
            while ((match = closePatterns.exec(bodyText)) !== null) {
              linkedIssues.push(parseInt(match[1]));
            }

            for (const issueNum of linkedIssues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNum,
                body: [
                  `## 🔀 Pull Request Created`,
                  ``,
                  `Copilot Agent has submitted: **PR #${pr.number}** — [${pr.title}](${pr.html_url})`,
                  ``,
                  `**Next step**: Waiting for automated tests to pass, then PR will be auto-merged.`,
                  ``,
                  `*Pipeline: Issue → Agent → [PR #${pr.number}] → Tests → Auto-Merge*`,
                ].join('\n'),
              }).catch(() => {});
            }
