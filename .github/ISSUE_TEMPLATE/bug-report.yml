name: 🐛 Bug Report
description: Report a bug in the dental chart system
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report
        Please provide as much detail as possible to help reproduce the issue.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Frontend — Tooth Chart SVG
        - Frontend — Periodontal Chart
        - Frontend — Treatment Plan
        - Frontend — Patient Management
        - Backend API
        - Database
        - Docker / Infrastructure
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS: 
        - Browser: 
        - .NET version: 
        - Node version: 
        - PostgreSQL version: 

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Screenshots
      description: Paste any relevant log output or attach screenshots
