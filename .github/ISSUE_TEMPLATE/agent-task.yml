name: 🤖 Agent Task
description: Create a task for the Copilot Coding Agent to implement.
title: "[Task-XX] "
labels: ["agent-task"]
assignees: []
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What is the goal of this task?
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: Requirements
      description: List every feature that must be implemented.
      value: |
        - [ ] Requirement 1
        - [ ] Requirement 2
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How do we verify this task is done correctly?
      value: |
        - [ ] Code compiles without errors
        - [ ] Feature works as described
    validations:
      required: true

  - type: input
    id: depends-on
    attributes:
      label: Depends On
      description: Issue numbers this task depends on (comma-separated)
      placeholder: "#1, #2"
